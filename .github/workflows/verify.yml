name: Verify Spine

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run local contract tests
        run: python3 -m unittest discover -s tests -v
      - name: Verify generated crawl surfaces
        run: python3 generate_crawl.py --check
      - name: Verify rendered Spine
        run: python3 render_spine.py --check
      - name: Crawl the live estate
        run: python3 verify_spine.py --local --json
